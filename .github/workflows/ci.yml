name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # logwatch is stdlib-only: requirements.txt is an intentional no-op,
      # so there is nothing third-party to install.

      - name: Run tests
        run: python -m unittest discover -s tests
